<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>
<div layout:fragment="content">

    <div class="row content">
        <div class="col">
            <div class="card">
                <div class="card-header">
                    Board Modify
                </div>
                <div class="card-body">
                    <form th:action="@{/board/modify}" method="post" id="f1">
                        <div class="input-group mb-3">
                            <span class="input-group-text">Bno:</span>
                            <input class="form-control" type="text" name="bno"
                                   th:value="${dto.bno}"
                                   readonly>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text">Title:</span>
                            <input class="form-control" type="text" name="title"
                                   th:value="${dto.title}"
                                   placeholder="board 제목을 입력해주세요">
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text">Content:</span>
                            <textarea class="form-control col-sm-5" rows="5" name="content"
                                      th:text="${dto.content}"
                            >
                        </textarea>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text"> Writer:  </span>
                            <input class="form-control" type="text"
                                   th:value="${dto.writer}"
                                   name="writer" readonly>
                        </div>
                        <!-- 이미지첨부 영역-->
                        <div class="mb-3 input-group">
                            <span class="input-group-text">첨부파일:  </span>
                            <div class="uploadHidden">
                                <!--첨부한 이미지의 요소를 첨부할 예정. 서버 전달용이라서, -->
                                <!-- 숨겨 두기.-->
                            </div>
                            <button type="button" class="btn btn-primary uploadFileBtn">파일추가</button>
                        </div>
                        <!-- 이미지첨부 영역-->


                        <div class="input-group mb-3">
                            <span class="input-group-text"> RegDate:  </span>
                            <input class="form-control" type="text"
                                   th:value="${#temporals.format(dto.regDate,'yyyy-MM-dd HH:mm:ss')}"
                                   name="regDate" disabled>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text"> ModDate:  </span>
                            <input class="form-control" type="text"
                                   th:value="${#temporals.format(dto.modDate,'yyyy-MM-dd HH:mm:ss')}"
                                   name="modDate" disabled>
                        </div>

                        <!--                        <button type="button" class="btn btn-primary listBtn">목록가기</button>-->
                        <button type="button" class="btn btn-secondary modBtn">수정하기</button>
                        <button type="button" class="btn btn-danger removeBtn">삭제하기</button>
                    </form>
                </div>
            </div> <!--        card 끝나는 부분-->
        </div> <!--        col 끝나는 부분-->
    </div> <!--        row 끝나는 부분-->

    <!--    첨부파일 썸네일 출력할 영역-->
    <!--    글작성 폼에서, 코드 재사용-->
    <!--    첨부 이미지 출력 해보기. -->
    <!--                        첨부한 이미지 섬네일 화면 미리보기 영역, -->
    <div class="row mt-3">
        <div class="col">
            <div class="d-flex uploadResult" style="flex-wrap: wrap">
                <!--                추가 작업, 이제는 게시글에 BoardDTO , 게시글, 댓글 갯수, 첨부 이미지들 다있음.-->
                <!--                꺼내서, 보여주기. -->
                <th:block th:each="fileName : ${dto.fileNames}">
                    <div class="card col-4" th:with="arr = ${fileName.split('_')}">
                        <div class="card-header d-flex justify-content-center">
                            [[${arr[1]}]]
                            <button class="btn-sm btn-danger"
                                    th:onclick="removeFile([[${arr[0]}]],[[${arr[1]}]],this)">
                                X
                            </button>
                        </div>
                        <div class="card-body">
                            <img th:src="|/view/s_${fileName}|" th:data-src="${fileName}">
                        </div>
                    </div>

                </th:block>

            </div>
        </div>
    </div>
    <!--                        첨부할 이미지 모달창 추가,(화면에 출력되어있지만 가려진 상태)-->
    <!--    첨부 파일 업로드 하는 폼 , 모달창 필요함. -->
    <!--    첨부파일 썸네일 출력할 영역-->


    <!--    첨부파일 추가를 위한 모달창. 글등록시 사용한 모달창 재사용-->
    <div class="modal uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>업로드 파일</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="input-group mb-3">
                        <!--                        <span class="input-group-text">첨부 파일</span>-->
                        <input type="file" name="files"
                               class="form-control" multiple></input>
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary closeRegisterBtn" data-bs-dismiss="modal">Close
                    </button>
                    <button type="button" class="btn btn-primary uploadBtn">업로드하기</button>
                </div>
            </div>
        </div>
    </div>
    <!--    첨부파일 추가를 위한 모달창. 글등록시 사용한 모달창 재사용-->

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/upload.js"></script>
</div>
<script layout:fragment="script" th:inline="javascript">
    const errors = [[${errors}]]
    console.log("서버로부터 받은 유효성 체크 오류 : ", errors)

    let errorMsg = ''
    if(errors) {
        for ( let i = 0; i < errors.length; i++) {
            errorMsg += `${errors[i].field}는 : ${errors[i].code} \n`
        }
        alert(errorMsg)
    }

    // 수정 로직 처리 , 이벤트 작업.
    const link = [[${pageRequestDTO.getLink()}]]
    // form 태그를 이용해서, 폼내부에 있는 값을 서버에 전달.
    const formObj = document.querySelector("#f1")

    // 순서1
    // 화면에서, 엑스박스를 클릭시, 화면에서 제거를 하기.
    // 글작성 화면에서, 첨부이미지를 포함해서, 서버에 axios 이용해서 전달하는 과정과 거의 비슷.
    // 수정시, 최종으로 삭제할 파일을 담아둘 목록 만들기.
    //최종으로 삭제할 첨부 파일 목록
    const removeFileList = []

    function removeFile(uuid, fileName, obj) {
        // yes -> 계속 삭제 진행,
        // no -> 함수 나가기.
        if (!confirm("파일을 삭제하시겠습니까?")) {
            return
        }
        console.log("uuid : " + uuid)
        console.log("fileName : " + fileName)
        console.log("obj : " + obj)

        // 삭제할 명단에 추가하기
        removeFileList.push({uuid, fileName})
        console.log("removeFileList : " , removeFileList)
        // 화면 상에서 카드 요소를 제거하기.
        const targetDiv = obj.closest(".card")
        targetDiv.remove()
    }

    // 순서2,
    // 업로드 모달 작업.
    // 글작성에서 사용했던 이벤트 리스너를 재사용.
    // 파일 업로드 작업
    // 순서2-1, 첨부 파일 업로드 모달창 띄우기.
    const uploadModal = new bootstrap.Modal(
        document.querySelector(".uploadModal")
    )
    document.querySelector(".uploadFileBtn").addEventListener("click",
        function (e) {
            e.stopPropagation();
            e.preventDefault();
            uploadModal.show();
        }, false)

    // 순서2-2,  첨부 파일 모달창에서, 파일 추가시 로직.
    document.querySelector(".uploadBtn").addEventListener("click",
        function (e) {
            const formObj = new FormData();
            // input 태그에서 이름 files의 요소를 선택.
            const fileInput = document.querySelector("input[name='files']")

            console.log(fileInput.files)

            // 선택된 파일들에서, 파일 객체 뽑아서 전달해주기.
            for (let i = 0; i < fileInput.files.length; i++) {
                formObj.append("files", fileInput.files[i])
            }

            console.log("formObj " + formObj)

            // axios 이용해서, 비동기 통신 하기.
            uploadToServer(formObj).then(
                result => {
                    // console.log(result)
                    // 섬네일 이미지를 표시하는 부분에 추가.
                    // 함수를 만들어서, 출력하는 기능 추가.
                    //, result : 서버에 이미지 파일을 업로드 후,
                    // uuid_파일명 형식의 리스트
                    // uploadResult , 하나의 이미지 파일명을 의미.
                    for (const uploadResult of result) {
                        console.log("uploadResult : " + uploadResult)
                        console.log("uploadResult.uuid : " + uploadResult.uuid)
                        console.log("uploadResult.fileName : " + uploadResult.fileName)
                        console.log("uploadResult.link : " + uploadResult.link)
                        // showUploadFile , 임의의 함수
                        showUploadFile(uploadResult)
                    }
                    uploadModal.hide()
                }
            )
                .catch(e => {
                    uploadModal.hide()
                })
        }, false)

    // 순서2-3
    // 섬네일 이미지를 출력하는 기능.showUploadFile
    // 결과 화면을 출력할 요소를 지정.
    const uploadResult = document.querySelector(".uploadResult")

    function showUploadFile({uuid, fileName, link}) {
        const str = `<div class="card col-4">
        <div class="card-header d-flex justify-content-center">
        ${fileName}
        <button class="btn-sm btn-danger" onclick="javascript:removeFile('${uuid}','${fileName}',this)">X</button>
        </div>
        <div class="card-body">
            <img src="/view/${link}" data-src="${uuid + "_" + fileName}">
        </div>
        </div>
`
        uploadResult.innerHTML += str
    }



    //순서4
    // appendFileData
    // 추가된 파일 이미지를 히든으로 추가해주는 함수.
    function appendFileData() {
        //  히든으로 추가된 첨부 이미지
        const target = document.querySelector(".uploadHidden")
        // 추가할 이미지들의 모든 파일
        const uploadFiles = uploadResult.querySelectorAll("img")

        // 첨부할 문자열, 태그를 저장할 변수 선언.
        let str = ''

        for (let i = 0; i < uploadFiles.length; i++) {
            const uploadFile = uploadFiles[i]
            const imgLink = uploadFile.getAttribute("data-src")
// 서버에서, BoardDTO에서, 받는 매개변수 , private List<String> fileNames;
            str += `<input type='hidden' name='fileNames' value="${imgLink}"/>`
        }
        target.innerHTML = str;
    }

    // 순서5
    // callRemoveFiles()
    function callRemoveFiles() {
        console.log("callRemoveFiles , removeFileList2  : " , removeFileList)
        // removeFileList.forEach(
        //     ({uuid, fileName}) => {
        //         removeFileToServer({uuid, fileName})
        //     })
        // 수정 1
        return removeFileList.map(
            ({uuid, fileName}) => {
                // 주의: 객체가 아닌 개별 인자로 풀어서 전달해야 합니다.
                return removeFileToServer(uuid, fileName);
            }
        )
    }

    // 순서3,
    // 수정 작업,
    //수정 하기 버튼 클릭시, 이벤트 작업.
    // 순서3
    // 수정 작업
    document.querySelector(".modBtn").addEventListener("click", function (e) {
        e.preventDefault()
        e.stopPropagation()

        formObj.action = `/board/modify?${link}`

        // 첨부파일을 히든으로 추가
        appendFileData()

        console.log("callRemoveFiles 호출전")

        // 비동기 삭제 요청(Promise)들의 배열을 가져옵니다.
        const removePromises = callRemoveFiles()

        // Promise.all을 통해 모든 삭제 요청이 성공적으로 끝날 때까지 기다립니다.
        Promise.all(removePromises)
            .then(() => {
                console.log("첨부 파일 삭제 요청 완료, 수정을 진행합니다.");
                formObj.method = 'post'
                formObj.submit() // 모든 삭제 요청 후 안전하게 submit 진행
            })
            .catch(err => {
                console.error("파일 삭제 통신 중 오류 발생:", err);
                // 만약 물리 파일 삭제가 실패하더라도 글 수정은 진행하고 싶다면 여기에 submit을 추가할 수 있습니다.
            });
    })

    // 순서6
    // 삭제 작업, 기존에 삭제 버튼을 클릭시 작업하는 부분이 위에 있음.
    // 아래로 가지고 와서, 수정.
    // 삭제하기.
    document.querySelector(".removeBtn").addEventListener("click", function (e){
            e.preventDefault();
            e.stopPropagation();
            // 추가 작업,
            // 화면에 보이는 파일들을 form 태그에 추가.
            appendFileData()

            // 화면에서 안보이도록 처리된 파일들을 form 태그에 추가.
            appendNotShowData()

            formObj.action = `/board/remove`
            formObj.method = "post"
            formObj.submit()
        }, false
    )

    // 순서7
    // 화면에 안보이는 첨부 이미지를 추가하는 작업.
    // 삭제시, 서버에 전달할 때, 삭제할 파일이름이 필요하므로
    function appendNotShowData() {
        if (removeFileList.length == 0) {
            return
        }
        const target = document.querySelector(".uploadHidden")
        let str = ''

        for (let i = 0; i < removeFileList.length; i++) {
            // removeFileList, 객체를 요소로 가지는 리스트.
            // 객체 구조 분해 할당.
            const {uuid, fileName} = removeFileList[i]
            str += `
            <input type="hidden" name="fileNames" value="${uuid}_${fileName}" >
            `
        }
        target.innerHTML += str;
    }


</script>
</body>
</html>
