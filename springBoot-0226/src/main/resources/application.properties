spring.application.name=springBoot-0226

# 1 마리아 디비 관련 설정222
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/webdb
spring.datasource.username=webuser
spring.datasource.password=webuser

# 2, 로그레벨 설정, 시스템은 등급  info, 우리가 사용하는 패키지는 debug 모드로
logging.level.org.springframework=debug
logging.level.com.busanit501=debug


# 3, spring data jpa 설정, 서버 시작시, 데이터 베이스의 생성 여부.
# 데이터베이스에 변경이 있을 경우만, 업데이트 반영을 한다.
# 예시, 기본 테이블에서, 제약조건을 변경한다면, 변경된 부분만 다시, 서버 재시작시 반영해줌.

# 추가 옵션,
# none : DDL 하지 않음.
# create-drop : 실행할 때, DDL 실행하고 종료시,
# 테이블 삭제,
# create : 실행할 때마다, 테이블 매번 새로 생성
# validate : 변경된 부분만 알려주고 종료
# 보통, 개발 단계, update
# 운영 단계, none, validate , 잘 변경안함.
spring.jpa.hibernate.ddl-auto=update
# 로깅 콘솔 출력시, sql 문장을 포맷팅 이쁘게 출력 해주기.
spring.jpa.properties.hibernate.format_sql=true
# sql 문장을 구체적으로 출력해주는 기능.2233
spring.jpa.show-sql=true

# 파일업로드 설정 부분
# 스프링에서, 파일 업로드 기능을 사용합니다.
spring.servlet.multipart.enabled=true
# 프로젝트시, 사용자가 업로드한 파일의 위치 경로
# 탐색기 임의의 파일 저장 위치에 폴더 생성하기.
# 임시 확인용.
# spring.servlet.multipart.location=c:\\upload\\springTest

# 최대 파일 이미지들의 전체 용량이, 100메가를 넘어가면 안됩니다.
spring.servlet.multipart.max-request-size=30MB
# 1개당 파일의 최대 크기 용량
spring.servlet.multipart.max-file-size=10MB

# 컨트롤러 파일에서, 지정할 경로.
com.busanit501.upload.path=c:\\upload\\springTest

# devtools 끄기
spring.devtools.restart.enabled=false


# application.properites 설정샘플
# 사용자가 카카오 로그인 버튼을 눌렀을 때 이동할 카카오 로그인 페이지 주소
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize

# 카카오가 사용자 정보를 줄 때, 사용자를 식별할 키 값 (카카오는 'id'라는 필드명을 사용함)
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# 인가 코드(Authorization Code)를 받은 후, 실제 Access Token으로 교환하기 위해 호출하는 주소
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token

# 발급받은 토큰을 이용해 사용자의 프로필(이름, 이메일 등) 정보를 가져오는 주소
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me

# 클라이언트의 이름 (자유롭게 지정 가능, 보통 kakao)
spring.security.oauth2.client.registration.kakao.client-name=kakao

# OAuth2 권한 부여 방식 (웹 애플리케이션에서는 가장 보안이 강력한 'authorization_code' 방식 사용)
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code

# 로그인이 성공한 후 카카오가 사용자 정보를 전달할 내 서버의 주소 (카카오 설정의 Redirect URI와 반드시 일치해야 함)
spring.security.oauth2.client.registration.kakao.redirect_uri=http://localhost:8080/login/oauth2/code/kakao

# [중요] 카카오 개발자 센터의 'REST API 키' 입력
spring.security.oauth2.client.registration.kakao.client-id=53ab4ff3e8950368b4bb8ae51e3ca6f1

# [중요] 카카오 개발자 센터의 'Client Secret' 입력 (보안 메뉴에서 생성한 값)
spring.security.oauth2.client.registration.kakao.client-secret=vrBJqmHfdH4GINbaOz1Xqio8H6ZHlnst

# 클라이언트 인증 방식: 시크릿 값을 POST 요청 바디에 담아 보낸다는 설정 (카카오 권장 방식)
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

# 카카오로부터 제공받고 싶은 정보의 범위 (카카오 설정의 '동의항목'과 일치해야 함)
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email,profile_image

